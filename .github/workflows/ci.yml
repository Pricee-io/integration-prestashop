name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: PrestaShop Module CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/bake-action@v5
        with:
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Start services
        run: make start

      - name: Run lint check
        run: make lint_ci

      - name: Run static analysis
        run: make analyze_ci

      - name: Stop services
        run: make stop
